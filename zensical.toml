[project]
site_name = "OpenG2G"
site_description = "A modular framework for datacenter-grid interaction with LLM workloads"
nav = [
  { "Home" = "index.md" },
  { "Getting Started" = [
    { "Installation" = "getting-started/installation.md" },
    { "Running a Simulation" = "getting-started/running.md" },
  ]},
  { "Guide" = [
    { "Concepts and Background" = "guide/concepts.md" },
    { "Data Pipeline" = "guide/data-pipeline.md" },
    { "Architecture" = "guide/architecture.md" },
    { "Composing Components" = "guide/composing.md" },
    { "Custom Components" = "guide/custom-components.md" },
  ]},
  { "API Reference" = [
    { "openg2g.coordinator" = "api/coordinator.md" },
    { "openg2g.clock" = "api/clock.md" },
    { "openg2g.types" = "api/types.md" },
    { "openg2g.events" = "api/events.md" },
    { "openg2g.models" = "api/models.md" },
    { "openg2g.datacenter" = "api/datacenter.md" },
    { "openg2g.datacenter.config" = "api/config.md" },
    { "openg2g.grid" = "api/grid.md" },
    { "openg2g.controller" = "api/controller.md" },
    { "openg2g.metrics" = "api/metrics.md" },
  ]},
]

[project.theme]
features = [
  "content.code.copy",
  "navigation.sections",
  "navigation.expand",
  "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle = { icon = "material/brightness-7", name = "Switch to dark mode" }

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle = { icon = "material/brightness-4", name = "Switch to light mode" }

# Zensical enables all 19 markdown extensions by default.
# Only override options that differ from defaults.
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.toc]
permalink = true

[project.plugins.mkdocstrings.handlers.python.options]
show_source = false
show_root_heading = true
members_order = "source"
