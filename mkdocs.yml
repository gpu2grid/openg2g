site_name: OpenG2G
site_description: A modular framework for datacenter-grid interaction with LLM workloads
repo_url: https://github.com/TODO/openg2g

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            members_order: source

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Running a Simulation: getting-started/running.md
  - Guide:
    - Concepts and Background: guide/concepts.md
    - Architecture: guide/architecture.md
    - Composing Components: guide/composing.md
    - Custom Components: guide/custom-components.md
  - API Reference:
    - openg2g.coordinator: api/coordinator.md
    - openg2g.clock: api/clock.md
    - openg2g.types: api/types.md
    - openg2g.events: api/events.md
    - openg2g.models: api/models.md
    - openg2g.datacenter: api/datacenter.md
    - openg2g.datacenter.config: api/config.md
    - openg2g.grid: api/grid.md
    - openg2g.controller: api/controller.md
    - openg2g.metrics: api/metrics.md
